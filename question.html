<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎂🎂🎂</title>
    <link type="text/css" rel="stylesheet" href="./file/default.css">
    <script type="text/javascript" src="./file/site.js" charset="utf-8"></script>
</head>
<body class="page-question">
    <div class="pixel-sky" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <main class="question-stage">
        <audio autoplay loop preload="auto" id="myAudio">
            <source src="lovesong.mp3" type="audio/mp3">
        </audio>

        <section class="pixel-window survey-window">
            <p class="kicker">Khảo sát người dùng</p>
            <h1>Do you think I am a good boyfriend?</h1>
            <p class="survey-copy">Please choose carefully. The judges are watching, and the judges are also me.</p>

            <div class="choice-zone" id="choice-zone">
                <a class="pixel-button yes-button" href="prize.html">YES</a>
                <button class="pixel-button no-button" id="no-button" type="button">NO</button>
            </div>

            <p class="tiny-note" id="tiny-note">Hint: one answer has better customer support.</p>
        </section>
    </main>

    <script>
        (function() {
            var noButton = document.getElementById("no-button");
            var zone = document.getElementById("choice-zone");
            var note = document.getElementById("tiny-note");
            var isFree = false;
            var isMoving = false;
            var messages = [
                "Đố anh bắt được em",
                "Bạn trai bà tuyệt vời vcl bà bt dell gì",
                "Bấm Yes đi mà",
                "Duma nhay thế bấm Yes đi",
                "Tao là con gà qua đường",
                "No No cái cc:)))",
                "Bấm No là bị hack:)))"
            ];
            var moveCount = 0;

            function clamp(value, min, max) {
                return Math.min(Math.max(value, min), max);
            }

            function freeButton() {
                if (isFree) {
                    return;
                }

                var buttonBox = noButton.getBoundingClientRect();
                isFree = true;
                noButton.classList.add("is-runaway");
                document.body.appendChild(noButton);
                noButton.style.left = buttonBox.left + "px";
                noButton.style.top = buttonBox.top + "px";
            }

            function randomSpotAwayFrom(pointerX, pointerY) {
                var buttonBox = noButton.getBoundingClientRect();
                var escapeDistance = clamp(window.innerWidth * 0.28, 240, 420);
                var padding = 16;
                var maxX = Math.max(padding, window.innerWidth - buttonBox.width - padding);
                var maxY = Math.max(padding, window.innerHeight - buttonBox.height - padding);
                var nextX = padding;
                var nextY = padding;
                var tries = 0;

                do {
                    nextX = padding + Math.random() * (maxX - padding);
                    nextY = padding + Math.random() * (maxY - padding);
                    tries++;
                } while (
                    tries < 80 &&
                    Math.hypot(nextX + buttonBox.width / 2 - pointerX, nextY + buttonBox.height / 2 - pointerY) < escapeDistance + 90
                );

                return {
                    x: clamp(nextX, padding, maxX),
                    y: clamp(nextY, padding, maxY)
                };
            }

            function moveNoButton(pointerX, pointerY) {
                if (isMoving) {
                    return;
                }

                isMoving = true;
                freeButton();
                var buttonBox = noButton.getBoundingClientRect();
                var fallbackX = window.innerWidth / 2;
                var fallbackY = window.innerHeight / 2;
                var target = randomSpotAwayFrom(pointerX || fallbackX, pointerY || fallbackY);
                var oldX = Math.round(buttonBox.left);
                var oldY = Math.round(buttonBox.top);
                var newX = Math.round(target.x);
                var newY = Math.round(target.y);

                noButton.style.left = newX + "px";
                noButton.style.top = newY + "px";
                noButton.style.transform = "rotate(" + (Math.random() > 0.5 ? 5 : -5) + "deg)";

                if (oldX !== newX || oldY !== newY) {
                    note.textContent = messages[moveCount % messages.length];
                    moveCount++;
                }

                window.setTimeout(function() {
                    isMoving = false;
                }, 90);
            }

            noButton.addEventListener("mouseenter", function(event) {
                moveNoButton(event.clientX, event.clientY);
            });
            noButton.addEventListener("pointerenter", function(event) {
                moveNoButton(event.clientX, event.clientY);
            });
            noButton.addEventListener("focus", function() {
                moveNoButton(window.innerWidth / 2, window.innerHeight / 2);
            });
            noButton.addEventListener("touchstart", function(event) {
                event.preventDefault();
                var touch = event.touches[0] || event.changedTouches[0];
                moveNoButton(touch.clientX, touch.clientY);
            }, { passive: false });
            noButton.addEventListener("click", function(event) {
                event.preventDefault();
                moveNoButton(event.clientX, event.clientY);
            });

            window.addEventListener("resize", function() {
                if (!isFree) {
                    return;
                }

                var buttonBox = noButton.getBoundingClientRect();
                noButton.style.left = clamp(buttonBox.left, 16, window.innerWidth - buttonBox.width - 16) + "px";
                noButton.style.top = clamp(buttonBox.top, 16, window.innerHeight - buttonBox.height - 16) + "px";
            });
        })();
    </script>
</body>
</html>
